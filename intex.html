<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* Moving galaxy background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: url("https://i.ibb.co/3yWbQ0X/stars.png");
  animation: moveBg 60s linear infinite;
  z-index: -1;
}
@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-500px, -500px); }
}

/* Center box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* Neon button */
button {
  padding: 14px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff0080, #ff0000);
  color: white;
  box-shadow: 0 0 20px #ff0080, 0 0 40px red;
  cursor: pointer;
}

/* Neon text */
#text {
  margin-top: 20px;
  font-size: 32px;
  color: white;
  text-shadow: 0 0 10px pink, 0 0 20px red, 0 0 40px purple;
}

/* Photo */
img {https://ibb.co/Y7yV3tBX}
  width: 160px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 0 30px pink;
}

/* Hearts */
.heart {😘😘😘😘😘}
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-10vh); opacity:1; }
  100% { transform: translateY(110vh); opacity:0; }
}

/* Intro screen */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  z-index: 10;
  animation: fadeOut 3s forwards;
  animation-delay: 2s;
}
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<div id="intro">For Someone Special 💖</div>

<div class="box">
  <button onclick="startLove()">Open 💌</button>
  <h1 id="text"></h1>
  <img id="photo" src="" style="display:none;">
</div>

<!-- Music (YouTube) -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/8aXx0Wz4Y7k?autoplay=1&loop=1&playlist=8aXx0Wz4Y7k"
frameborder="0" allow="autoplay"></iframe>

</html>
